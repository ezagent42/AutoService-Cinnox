<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoService Web</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: monospace;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        #container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #4fc3f7;
            margin-bottom: 20px;
        }
        #messages {
            background: #0d0d0d;
            border: 1px solid #333;
            padding: 15px;
            height: 500px;
            overflow-y: auto;
            margin-bottom: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .user-msg {
            color: #81c784;
            margin-bottom: 10px;
        }
        .agent-msg {
            color: #e0e0e0;
            margin-bottom: 10px;
        }
        .error-msg {
            color: #ef5350;
        }
        .system-msg {
            color: #ffb74d;
            font-style: italic;
        }
        #input-area {
            display: flex;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            background: #0d0d0d;
            border: 1px solid #333;
            color: #e0e0e0;
        }
        #user-input:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        button {
            padding: 10px 20px;
            font-family: monospace;
            font-size: 14px;
            background: #4fc3f7;
            border: none;
            color: #000;
            cursor: pointer;
        }
        button:hover {
            background: #29b6f6;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        #status {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
        .connected { color: #81c784; }
        .disconnected { color: #ef5350; }
    </style>
</head>
<body>
    <div id="container">
        <h1>AutoService Web</h1>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="输入指令 (例如: /marketing create product --mock)" autofocus>
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
        <div id="status" class="disconnected">未连接</div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('status');

        let ws = null;
        let currentAgentResponse = null;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                statusDiv.textContent = '已连接';
                statusDiv.className = 'connected';
                sendBtn.disabled = false;
            };

            ws.onclose = () => {
                statusDiv.textContent = '连接断开，尝试重连...';
                statusDiv.className = 'disconnected';
                sendBtn.disabled = true;
                setTimeout(connect, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }

        function handleMessage(data) {
            if (data.type === 'chunk') {
                if (!currentAgentResponse) {
                    currentAgentResponse = document.createElement('div');
                    currentAgentResponse.className = 'agent-msg';
                    messagesDiv.appendChild(currentAgentResponse);
                }

                // Format the content
                const content = formatContent(data.content);
                currentAgentResponse.textContent += content;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } else if (data.type === 'done') {
                currentAgentResponse = null;
                appendMessage('--- 响应完成 ---', 'system-msg');
            } else if (data.type === 'error') {
                appendMessage('错误: ' + data.content, 'error-msg');
                currentAgentResponse = null;
            }
        }

        function formatContent(content) {
            if (typeof content === 'string') {
                return content + '\n';
            }
            if (content && typeof content === 'object') {
                // Handle different message types
                if (content._type) {
                    // It's a typed object from the SDK
                    return JSON.stringify(content, null, 2) + '\n';
                }
                return JSON.stringify(content, null, 2) + '\n';
            }
            return String(content) + '\n';
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            appendMessage('> ' + text, 'user-msg');
            ws.send(JSON.stringify({ type: 'message', content: text }));
            userInput.value = '';
        }

        // Enter key to send
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Start connection
        connect();
    </script>
</body>
</html>
